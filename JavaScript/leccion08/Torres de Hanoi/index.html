  <div class="tablero">

      <div class="palo"></div>
      <h2>A</h2>
    </div>

    <div class="poste" id="B">
      <div class="palo"></div>
      <h2>B</h2>
    </div>

    <div class="poste" id="C">

    </div>

</html>
